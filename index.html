<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>tripleS 生涯表 3.0 產生器</title>

    <style>

        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }

        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        canvas { max-width: 100%; height: auto; border: 1px solid #ccc; cursor: pointer; background-color: #eee; }

        .controls { margin-top: 15px; }

        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #ff4757; color: #fff; border: none; border-radius: 5px; font-weight: bold; }

        button:hover { background: #ff6b81; }

        p { color: #666; font-size: 14px; }

    </style>

</head>

<body>



<div class="container">

    <h2>tripleS 生涯表 3.0 產生器</h2>

    <p>💡 使用方式：點擊格子即可上傳照片，完成後按下方下載</p>

    

    <canvas id="canvas"></canvas>

    <input type="file" id="fileInput" accept="image/*" style="display: none;">

    

    <div class="controls">

        <button id="downloadBtn">保存我的生涯表 (PNG)</button>

    </div>

    <p style="margin-top: 20px;">Designed for WAVs</p>

</div>



<script>

    const canvas = document.getElementById('canvas');

    const ctx = canvas.getContext('2d');

    const fileInput = document.getElementById('fileInput');

    const downloadBtn = document.getElementById('downloadBtn');



    // 注意：這裡的檔名必須跟你上傳到 GitHub 的圖片檔名「完全一模一樣」

    const templateSrc = 'triples.png'; 

    const imgTemplate = new Image();

    

    // 設定底圖載入

    imgTemplate.onload = () => {

        canvas.width = imgTemplate.width;

        canvas.height = imgTemplate.height;

        initGrids();

        drawCanvas();

    };

    imgTemplate.src = templateSrc;



    let selectedGrid = -1;

    const grids = [];



    // 初始化 12 個格子的位置 (根據 3.0 模板比例預估)

    function initGrids() {

        const startX = 30;  

        const startY = 200; 

        const cellW = 340; 

        const cellH = 380;

        const gapX = 45;

        const gapY = 115;



        for (let row = 0; row < 3; row++) {

            for (let col = 0; col < 4; col++) {

                grids.push({

                    x: startX + col * (cellW + gapX),

                    y: startY + row * (cellH + gapY),

                    w: cellW,

                    h: cellH,

                    img: null

                });

            }

        }

    }



    function drawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. 先畫上傳的照片在最底層
        grids.forEach(grid => {
            if (grid.img) {
                // 讓照片填滿格子
                ctx.drawImage(grid.img, grid.x, grid.y, grid.w, grid.h);
            }
        });

        // 🌟 魔法加在這裡：設定混合模式，過濾掉底圖的白色
        ctx.globalCompositeOperation = 'multiply';

        // 2. 疊加底圖（此時白底會變透明，黑線與文字會印在照片上）
        ctx.drawImage(imgTemplate, 0, 0);

        // 3. 畫完底圖後，恢復正常模式，以免影響後續操作
        ctx.globalCompositeOperation = 'source-over';
    }



    // 點擊 Canvas 觸發檔案上傳

    canvas.addEventListener('click', (e) => {

        const rect = canvas.getBoundingClientRect();

        const scaleX = canvas.width / rect.width;

        const scaleY = canvas.height / rect.height;

        const mouseX = (e.clientX - rect.left) * scaleX;

        const mouseY = (e.clientY - rect.top) * scaleY;



        selectedGrid = grids.findIndex(g => 

            mouseX > g.x && mouseX < g.x + g.w &&

            mouseY > g.y && mouseY < g.y + g.h

        );



        if (selectedGrid !== -1) {

            fileInput.click();

        }

    });



    // 處理上傳的照片

    fileInput.onchange = (e) => {

        const file = e.target.files[0];

        if (!file) return;

        const reader = new FileReader();

        reader.onload = (event) => {

            const img = new Image();

            img.onload = () => {

                grids[selectedGrid].img = img;

                drawCanvas();

            };

            img.src = event.target.result;

        };

        reader.readAsDataURL(file);

    };



    // 下載功能

    downloadBtn.onclick = () => {

        const link = document.createElement('a');

        link.download = 'my_tripleS_table.png';

        link.href = canvas.toDataURL('image/png');

        link.click();

    };

</script>



</body>

</html>
